name: Snowflake Deploy
on:
  push:
    branches: [ main, qa ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set deployment environment
        id: env
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          echo "Target branch: $TARGET_BRANCH"

          if [ "$TARGET_BRANCH" = "qa" ]; then
            echo "ENV=QA" >> $GITHUB_ENV
            echo "SNOWFLAKE_ROLE=GITHUB_CICD_ROLE_QA" >> $GITHUB_ENV
            echo "SNOWFLAKE_USER=GITHUB_SERVICE_USER_QA" >> $GITHUB_ENV
            echo "SNOWFLAKE_PRIVATE_KEY_SECRET=SNOWFLAKE_PRIVATE_KEY_QA" >> $GITHUB_ENV
            echo "SNOWFLAKE_WAREHOUSE=COMPUTE_WH" >> $GITHUB_ENV

          elif [ "$TARGET_BRANCH" = "main" ]; then
            echo "ENV=PROD" >> $GITHUB_ENV
            echo "SNOWFLAKE_ROLE=GITHUB_CICD_ROLE" >> $GITHUB_ENV
            echo "SNOWFLAKE_USER=GITHUB_SERVICE_USER" >> $GITHUB_ENV
            echo "SNOWFLAKE_PRIVATE_KEY_SECRET=SNOWFLAKE_PRIVATE_KEY" >> $GITHUB_ENV
            echo "SNOWFLAKE_WAREHOUSE=COMPUTE_WH" >> $GITHUB_ENV
          fi

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli "pyOpenSSL>=22.1.0"

      - name: Write private key to file
        run: |
          if [ "$ENV" = "QA" ]; then
            echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY_QA }}" > private_key.p8
          else
            echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > private_key.p8
          fi

      - name: Determine SQL files to run
        id: changes
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"

          if [ "$TARGET_BRANCH" = "qa" ]; then
            echo "Mode: incremental (diff-based) for QA"
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '^sql/.*\.sql$' || true)
          else
            echo "Mode: full deploy for main"
            CHANGED_FILES=$(find sql -type f -name "*.sql" | sort || true)
          fi

          ORDERED=$(echo "$CHANGED_FILES" | sort -t'/' -k3,3)

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$ORDERED" | sed '/^$/d' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run SQL scripts
        if: steps.changes.outputs.files != ''
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ env.SNOWFLAKE_USER }}
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_PRIVATE_KEY_PATH: private_key.p8
          SNOWFLAKE_ROLE: ${{ env.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ env.SNOWFLAKE_WAREHOUSE }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            echo "Executing: $file"

            db_family=$(echo "$file" | awk -F'/' '{print $2}')

            filename=$(basename "$file")
            schema=$(echo "$filename" | cut -d'.' -f1)
            schema_upper=$(echo "$schema" | tr '[:lower:]' '[:upper:]')

            if [ "$db_family" = "staging" ]; then
              database="STAGING_${ENV}"
            elif [ "$db_family" = "analytics" ]; then
              database="ANALYTICS_${ENV}"
            else
              echo "Unknown database family: $db_family"
              exit 1
            fi

            echo "Resolved database: $database"
            echo "Resolved schema: $schema_upper"

            # Detect schema creation files
            if echo "$file" | grep -q "/1_schemas/"; then
              echo "Schema creation file detected — skipping USE SCHEMA"
              snow sql -q "USE DATABASE $database; USE WAREHOUSE $SNOWFLAKE_WAREHOUSE; $(cat "$file")" -x
            else
              snow sql -q "USE DATABASE $database; USE SCHEMA $schema_upper; USE WAREHOUSE $SNOWFLAKE_WAREHOUSE; $(cat "$file")" -x
            fi

          done <<< "${{ steps.changes.outputs.files }}"

      - name: No SQL changes detected
        if: steps.changes.outputs.files == ''
        run: echo "No SQL files selected for this run. Skipping deployment."