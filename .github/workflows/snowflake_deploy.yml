name: Snowflake Deploy
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake CLI and Fix Compatibility
        run: |
          pip install snowflake-cli "pyOpenSSL>=22.1.0"

      - name: Write private key to file
        run: |
          echo "$SNOWFLAKE_PRIVATE_KEY" > private_key.p8
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

      - name: Run Deploy Script
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: GITHUB_SERVICE_USER
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_PRIVATE_KEY_PATH: private_key.p8

        run: |
          # Test the connection first
          snow sql -q "SELECT CURRENT_VERSION()" -x

          # Deploy your actual table
          snow sql --filename scripts/create_table.sql -x
          