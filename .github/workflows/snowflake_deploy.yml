name: Snowflake Deploy
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake CLI and Fix Compatibility
        run: |
          # This installs the CLI and the fix together in the same environment
          pip install snowflake-cli-labs==3.1.0 "pyOpenSSL>=22.1.0"

      - name: Run Deploy Script
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: GITHUB_SERVICE_USER
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
        # run: snow sql --file scripts/create_table.sql
        run: 
